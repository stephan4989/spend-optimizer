version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8g

  notebook:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      bash -c "pip install -q jupyter notebook ipykernel &&
               jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser
               --NotebookApp.token='' --NotebookApp.password=''
               --notebook-dir=/notebooks"
    ports:
      - "8888:8888"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - ./notebooks:/notebooks
      - ./:/data
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - notebook
